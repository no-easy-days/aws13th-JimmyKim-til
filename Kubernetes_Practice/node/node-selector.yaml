apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-dep
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: my-con
        image: 61.254.18.30:5000/ipnginx
      nodeSelector:
        gpu: "true"
