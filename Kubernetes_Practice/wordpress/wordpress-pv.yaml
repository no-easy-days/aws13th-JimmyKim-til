apiVersion: v1
kind: PersistentVolume
metadata:
  name: wordpress-pv
spec:
  capacity:
    storage: 1Gi                                # *****
  accessModes:
    - ReadWriteMany                            # *****
  persistentVolumeReclaimPolicy: Retain         # *****
  nfs:
    path: /shared/wordpress
    server: 211.183.3.100
