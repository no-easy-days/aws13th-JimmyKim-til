---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast
#provisioner: k8s-sigs.io/nfs-subdir-external-provisioner # or choose another name, must match deployment's env PROVISIONER_NAME'
provisioner: fast
parameters:
  archiveOnDelete: "false"

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: slow
#provisioner: k8s-sigs.io/nfs-subdir-external-provisioner # or choose another name, must match deployment's env PROVISIONER_NAME'
provisioner: slow
parameters:
  archiveOnDelete: "false"

